description: Build MinGW compiler (ubuntu)


inputs:
  auto:
    description: Automatic handling
    required: false
    default: ''

  token:
    description: Github token
    required: false
    default: ''


runs:
  using: composite

  steps:
    - if: inputs.auto != ''
      uses: li1ht2ay-3es/gi1-ac2io3s@user-action



    - if: inputs.auto != ''
      uses: li1ht2ay-3es/gi1-ac2io3s@checkout-branch
      with:
        token: ${{ inputs.token }}



    - if: runner.os == 'Linux'
      working-directory: ${{ github.action_path }}
      shell: bash
      run: |
        sudo apt-get install \
          binutils-mingw-w64-i686 \
          g++-mingw-w64-i686 \
          gcc-mingw-w64-i686 \
          mingw-w64-i686-dev \
          gcc-multilib \
          g++-multilib


        zip -9 -q -r ${{ github.workspace }}/mingw_x86.zip \
          /usr/i686-w64-mingw32 \
          /usr/bin/i686-w64-mingw32-* \
          /usr/lib/gcc/i686-w64-mingw32/*-posix \
          /usr/share/mingw-w64


        printf "\n\n===  Testing  ===\n\n"
        unzip -l ${{ github.workspace }}/mingw_x86.zip


        printf "\n\n===  Version  ===\n\n"
        i686-w64-mingw32-gcc-posix --version


        cd ${{ github.workspace }}
        split --verbose -b100m mingw_x86.zip mingw_x86.
        rm mingw_x86.zip



    - if: runner.os == 'Linux'
      working-directory: ${{ github.action_path }}
      shell: bash
      run: |
        sudo apt-get install \
          binutils-mingw-w64-x86-64 \
          g++-mingw-w64-x86-64 \
          gcc-mingw-w64-x86-64 \
          mingw-w64-x86-64-dev \
          gcc-multilib \
          g++-multilib


        zip -9 -q -r ${{ github.workspace }}/mingw_x64.zip \
          /usr/x86_64-w64-mingw32 \
          /usr/bin/x86_64-w64-mingw32-* \
          /usr/lib/gcc/x86_64-w64-mingw32/*-posix \
          /usr/share/mingw-w64


        printf "\n\n===  Testing  ===\n\n"
        unzip -l ${{ github.workspace }}/mingw_x64.zip


        printf "\n\n===  Version  ===\n\n"
        i686-w64-mingw32-gcc-posix --version


        cd ${{ github.workspace }}
        split --verbose -b100m mingw_x64.zip mingw_x64.
        rm mingw_x64.zip



    - if: runner.os == 'Linux'
      shell: bash
      run: |
        git add .
        git commit -m "mingw update"
        git push -f origin
